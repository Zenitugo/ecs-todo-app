<!DOCTYPE html>
<html>
<head>
    <title>My Todo App 🚀</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        input { padding: 8px; width: 70%; }
        button { padding: 8px 16px; background: #007bff; color: white; border: none; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .done { text-decoration: line-through; color: #999; }
    </style>
</head>
<body>
    <h1>Todo App 🚀</h1>
    <input type="text" id="task" placeholder="Add a new task..." />
    <button onclick="addTodo()">Add</button>
    <ul id="todo-list">
        {% for todo in todos %}
        <li>
            <span class="{{ 'done' if todo.done }}">{{ todo.task }}</span>
            <div>
                <button onclick="completeTodo({{ todo.id }})">✅</button>
                <button onclick="deleteTodo({{ todo.id }})">🗑️</button>
            </div>
        </li>
        {% endfor %}
    </ul>

    <script>
        async function addTodo() {
            const task = document.getElementById("task").value;
            await fetch("/todos", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ task })
            });
            location.reload();
        }

        async function completeTodo(id) {
            await fetch(`/todos/${id}`, { method: "PUT" });
            location.reload();
        }

        async function deleteTodo(id) {
            await fetch(`/todos/${id}`, { method: "DELETE" });
            location.reload();
        }
    </script>
</body>
</html>
