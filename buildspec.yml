version: 0.2

env:
  # Environment variable configuration
  AWS_DEFAULT_REGION: "us-east-1"
  APP_NAME: "ecs-todo-app-container"
  CLUSTER_NAME: "ecs-todo-app-cluster"
  SERVICE_NAME: "ecs-todo-app-service"


phases:
  pre_build:
    # Pre-build steps (linting, login)
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URL
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
  build:
    # Main build commands
    commands:
      - echo Building the Docker image...
      - docker build -t $APP_NAME:$IMAGE_TAG ./app
      - docker tag $APP_NAME:$IMAGE_TAG $ECR_REPO_URL:latest
      - docker tag $APP_NAME:$IMAGE_TAG $ECR_REPO_URL:$IMAGE_TAG
  post_build:
    # Post-build steps (notifications, cleanup)
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push $ECR_REPO_URL:latest
      - docker push $ECR_REPO_URL:$IMAGE_TAG
      - echo Creating image definition file...
      - printf '[{"name":"%s","imageUri":"%s"}]' "$APP_NAME" "$ECR_REPO_URL" "$IMAGE_TAG" > imagedefinitions.json
      - echo "imagedefinitions.json contents:"
      - cat imagedefinitions.json
      - echo Build completed on `date`
artifacts:
  # Build output configuration
  files:
    - imagedefinitions.json